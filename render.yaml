services:
  - type: web
    name: pamodzi-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pamodzi-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: STELLAR_HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: STELLAR_FRIENDBOT_URL
        value: https://friendbot.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: "Test SDF Network ; September 2015"

databases:
  - name: pamodzi-db
    plan: free
    databaseName: pamodzi
    user: pamodzi
